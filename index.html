<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲食回報系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for Browser Rendering -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-gray-900">
    <div id="root"></div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // --- Firebase 配置 (請確認與您的專案資訊一致) ---
        const firebaseConfig = {
            apiKey: "AIzaSyBY5DHhvroCGnazBmvnUTUiaqbckWeBgJM",
            authDomain: "diet-tracker-janice.firebaseapp.com",
            projectId: "diet-tracker-janice",
            storageBucket: "diet-tracker-janice.firebasestorage.app",
            messagingSenderId: "714595945356",
            appId: "1:714595945356:web:d1e5205e7390fa512524a9"
        };

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "", strokeWidth = 2, fill = "none" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = "";
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    if (size) {
                        iconElement.style.width = `${size}px`;
                        iconElement.style.height = `${size}px`;
                    }
                    if (className) iconElement.className = className;
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({
                        attrs: { 'stroke-width': strokeWidth, 'fill': fill }
                    });
                }
            }, [name, size, className, strokeWidth, fill]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const getLocalISOString = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return new Date(now - offset).toISOString().slice(0, 16);
        };

        const compressImage = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
            });
        };

        const App = () => {
            const [view, setView] = useState('login');
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [allRecords, setAllRecords] = useState([]);
            const [appUsers, setAppUsers] = useState([]);
            const [editingId, setEditingId] = useState(null);
            const [adminFilterUser, setAdminFilterUser] = useState('all');
            const [adviceInputs, setAdviceInputs] = useState({});
            const [loginData, setLoginData] = useState({ username: '', password: '', error: null });
            const [newUserFormData, setNewUserFormData] = useState({ username: '', password: '', role: 'user' });
            const [setupError, setSetupError] = useState(null);
            
            const [formData, setFormData] = useState({
                time: getLocalISOString(), mealType: '早餐', foodContent: '', drinkContent: '', isFull: '普通', photo: null
            });

            useEffect(() => {
                if (!window.firebase) return;
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                const auth = firebase.auth();

                const initFirebase = async () => {
                    try {
                        try { await auth.signInAnonymously(); } catch (e) { console.error("Anonymous login failed", e); }
                        db.collection('diet_records').orderBy('time', 'desc').onSnapshot(snap => {
                            setAllRecords(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                            setSetupError(null);
                        }, err => {
                            if (err.message.includes("available in project") || err.message.includes("retry in")) {
                                setSetupError({ type: "PROV", title: "資料庫建立中", message: "請稍候 3-5 分鐘系統即可就緒。" });
                            } else if (err.message.includes("API") || err.code === 'permission-denied') {
                                setSetupError({ type: "API", title: "API 設定未完成", message: "請確認 Cloud Firestore API 已啟用且安全規則允許讀寫。", link: `https://console.developers.google.com/apis/api/firestore.googleapis.com/overview?project=${firebaseConfig.projectId}` });
                            }
                        });
                        db.collection('app_users').onSnapshot(snap => {
                            setAppUsers(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                        });
                    } catch (err) { console.error(err); } finally { setLoading(false); }
                };
                initFirebase();
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const { username, password } = loginData;
                if (username === 'admin' && password === 'admin1357') {
                    setCurrentUser({ name: '管理員', role: 'admin' });
                    setView('admin');
                } else {
                    const found = appUsers.find(u => u.username === username && u.password === password);
                    if (found) {
                        setCurrentUser({ name: found.username, role: found.role });
                        setView(found.role === 'admin' ? 'admin' : 'report');
                    } else {
                        setLoginData(prev => ({ ...prev, error: '帳號或密碼錯誤' }));
                        setTimeout(() => setLoginData(prev => ({ ...prev, error: null })), 2500);
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const db = firebase.firestore();
                try {
                    let photo = formData.photo;
                    if (photo && photo.startsWith('data:image')) photo = await compressImage(photo);
                    const payload = { ...formData, photo, username: currentUser.name, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (editingId) {
                        await db.collection('diet_records').doc(editingId).update(payload);
                    } else {
                        await db.collection('diet_records').add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp(), advice: "" });
                    }
                    setShowSuccess(true);
                    setEditingId(null);
                    setFormData({ time: getLocalISOString(), mealType: '早餐', foodContent: '', drinkContent: '', isFull: '普通', photo: null });
                    setTimeout(() => { setShowSuccess(false); setView('history'); }, 1500);
                } catch (err) { alert("送出失敗: " + err.message); } finally { setIsSubmitting(false); }
            };

            const handleSaveAdvice = async (recordId) => {
                const text = adviceInputs[recordId];
                if (!text?.trim()) return;
                await firebase.firestore().collection('diet_records').doc(recordId).update({ advice: text, adviceAt: firebase.firestore.FieldValue.serverTimestamp() });
                setAdviceInputs(prev => ({ ...prev, [recordId]: '' }));
            };

            const downloadCSV = () => {
                const records = getDisplayRecords();
                if (records.length === 0) return;
                const headers = ['時間', '餐點', '內容', '飲料', '飽足感', '回報者', '建議'];
                const csvContent = "\ufeff" + [headers.join(','), ...records.map(r => [`"${r.time}"`, `"${r.mealType}"`, `"${(r.foodContent || '').replace(/"/g, '""')}"`, `"${(r.drinkContent || '').replace(/"/g, '""')}"`, `"${r.isFull}"`, `"${r.username}"`, `"${(r.advice || '').replace(/"/g, '""')}"`].join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `飲食報表_${currentUser.name}.csv`;
                link.click();
            };

            const getDisplayRecords = () => {
                if (currentUser?.role === 'admin') {
                    return adminFilterUser === 'all' ? allRecords : allRecords.filter(r => r.username === adminFilterUser);
                }
                return allRecords.filter(r => r.username === currentUser?.name);
            };

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-blue-600 animate-pulse text-lg tracking-widest uppercase">Initializing...</div>;

            return (
                <div className="min-h-screen flex flex-col relative overflow-x-hidden font-sans">
                    
                    {setupError && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/95 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[40px] p-8 max-w-sm text-center shadow-2xl space-y-6">
                                <Icon name="alert-circle" size={60} className="mx-auto text-amber-500" />
                                <h2 className="text-2xl font-black">{setupError.title}</h2>
                                <p className="text-gray-500 text-sm font-bold leading-relaxed">{setupError.message}</p>
                                {setupError.link && <a href={setupError.link} target="_blank" className="bg-blue-600 text-white py-4 rounded-2xl block font-black uppercase tracking-widest text-xs">前往設定頁面</a>}
                                <button onClick={() => window.location.reload()} className="w-full text-xs text-gray-400 font-black uppercase hover:text-blue-500 transition-colors">設定完後重新整理</button>
                            </div>
                        </div>
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 z-[90] flex items-center justify-center bg-white/80 backdrop-blur-sm transition-all">
                            <div className="flex flex-col items-center animate-bounce">
                                <div className="bg-green-500 p-6 rounded-full text-white shadow-xl mb-4"><Icon name="check" size={64} strokeWidth={4} /></div>
                                <h2 className="text-2xl font-black text-slate-800">儲存成功!</h2>
                            </div>
                        </div>
                    )}

                    {/* 導覽列 */}
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 px-4 py-3 md:px-8 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 group cursor-default">
                                <div className="bg-blue-600 p-1.5 rounded-lg text-white group-hover:rotate-12 transition-transform shadow-lg shadow-blue-200">
                                    <Icon name="utensils" size={20} />
                                </div>
                                <span className="font-black text-xl tracking-tighter text-slate-800">飲食管家<span className="text-blue-600">.Pro</span></span>
                            </div>
                            
                            {currentUser && (
                                <div className="flex items-center gap-2 md:gap-6">
                                    <div className="hidden md:flex items-center gap-2">
                                        <button onClick={() => setView(currentUser.role === 'admin' ? 'admin' : 'report')} className={`px-4 py-2 rounded-xl text-sm font-black transition-all ${['report', 'admin'].includes(view) ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>
                                            {currentUser.role === 'admin' ? '監控後台' : '回報餐點'}
                                        </button>
                                        <button onClick={() => setView('history')} className={`px-4 py-2 rounded-xl text-sm font-black transition-all ${view === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>歷史紀錄</button>
                                        {currentUser.role === 'admin' && (
                                            <button onClick={() => setView('userManagement')} className={`px-4 py-2 rounded-xl text-sm font-black transition-all ${view === 'userManagement' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}>帳號管理</button>
                                        )}
                                    </div>
                                    <div className="h-8 w-[1px] bg-slate-200 hidden md:block"></div>
                                    <div className="flex items-center gap-3">
                                        <div className="text-right hidden sm:block">
                                            <div className="text-[10px] font-black text-slate-300 uppercase leading-none mb-0.5">Welcome</div>
                                            <div className="text-sm font-black text-slate-700 leading-none">{currentUser.name}</div>
                                        </div>
                                        <button onClick={() => {setView('login'); setCurrentUser(null);}} className="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all border border-transparent hover:border-red-100">
                                            <Icon name="log-out" size={20} />
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className={`flex-1 p-4 md:p-8 w-full mx-auto ${view === 'history' || view === 'admin' ? 'max-w-7xl' : 'max-w-2xl'}`}>
                        
                        {view === 'login' && (
                            <div className="mt-10 md:mt-20 max-w-md mx-auto animate-in">
                                <div className="bg-white rounded-[40px] p-8 md:p-12 shadow-2xl border border-slate-100 relative overflow-hidden text-center">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                                    <h1 className="text-4xl font-black text-slate-800 tracking-tighter mb-2">LOGIN</h1>
                                    <p className="text-slate-400 font-bold text-sm mb-10">健康由每天的飲食回報開始</p>
                                    <form onSubmit={handleLogin} className="space-y-5 text-left">
                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"><Icon name="user" size={18} /></div>
                                            <input placeholder="帳號" className="w-full p-5 pl-12 bg-slate-50 border-none rounded-[24px] font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" value={loginData.username} onChange={e => setLoginData({...loginData, username: e.target.value})} required />
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"><Icon name="lock" size={18} /></div>
                                            <input type="password" placeholder="密碼" className="w-full p-5 pl-12 bg-slate-50 border-none rounded-[24px] font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                                        </div>
                                        {loginData.error && <p className="text-red-500 text-xs font-black text-center bg-red-50 py-3 rounded-xl animate-in">{loginData.error}</p>}
                                        <button className="w-full bg-slate-900 text-white font-black py-6 rounded-[28px] shadow-xl hover:bg-blue-600 active:scale-95 transition-all text-lg">登入系統</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {view === 'userManagement' && (
                            <div className="max-w-4xl mx-auto space-y-8 animate-in">
                                <h2 className="text-3xl font-black tracking-tighter flex items-center gap-3 px-2">
                                    <Icon name="users" size={32} className="text-blue-600" /> 帳號管理中心
                                </h2>
                                <div className="bg-white p-8 rounded-[40px] shadow-lg border border-slate-100 flex flex-col md:flex-row gap-6 items-end">
                                    <div className="flex-1 w-full space-y-4 text-left">
                                        <h3 className="text-[11px] font-black text-blue-500 uppercase tracking-widest px-1">新增使用者 (Add User)</h3>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <input placeholder="帳號名稱" className="p-4 rounded-2xl bg-slate-50 font-bold border-none shadow-inner" value={newUserFormData.username} onChange={e => setNewUserFormData({...newUserFormData, username: e.target.value})} />
                                            <input placeholder="密碼" className="p-4 rounded-2xl bg-slate-50 font-bold border-none shadow-inner" value={newUserFormData.password} onChange={e => setNewUserFormData({...newUserFormData, password: e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={async () => {
                                        if(!newUserFormData.username || !newUserFormData.password) return;
                                        await firebase.firestore().collection('app_users').add({ ...newUserFormData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                                        setNewUserFormData({username: '', password: '', role: 'user'});
                                    }} className="w-full md:w-32 bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all">新增</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {appUsers.map(u => (
                                        <div key={u.id} className="bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm hover:shadow-md transition-all group">
                                            <div>
                                                <div className="font-black text-lg tracking-tight">{u.username}</div>
                                                <div className="text-[10px] font-black text-slate-300 uppercase tracking-widest">PASS: {u.password}</div>
                                            </div>
                                            <button onClick={() => confirm(`刪除帳號 ${u.username}?`) && firebase.firestore().collection('app_users').doc(u.id).delete()} className="p-3 text-slate-300 hover:text-red-500 bg-slate-50 rounded-2xl transition-all">
                                                <Icon name="trash-2" size={20} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'report' && (
                            <div className="max-w-2xl mx-auto space-y-6 animate-in">
                                <h2 className="text-3xl font-black tracking-tighter px-2">{editingId ? '編輯數據紀錄' : '新增餐點回報'}</h2>
                                <form onSubmit={handleSubmit} className="bg-white rounded-[40px] p-8 md:p-10 shadow-2xl border border-slate-50 space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">回報時間</label>
                                            <input type="datetime-local" className="w-full bg-slate-50 p-4 rounded-2xl font-black border-none shadow-inner" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">餐點類別</label>
                                            <div className="grid grid-cols-2 gap-2">
                                                {['早餐', '午餐', '晚餐', '點心'].map(t => (
                                                    <button key={t} type="button" onClick={() => setFormData({...formData, mealType: t})} className={`py-3 rounded-xl text-xs font-black transition-all ${formData.mealType === t ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-50 text-slate-400'}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">飲食內容</label>
                                            <textarea placeholder="例如：雞腿便當、一顆蘋果..." className="w-full p-6 bg-slate-50 rounded-[32px] h-32 border-none focus:ring-2 focus:ring-blue-500/20 resize-none font-bold shadow-inner" value={formData.foodContent} onChange={e => setFormData({...formData, foodContent: e.target.value})} required />
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors"><Icon name="coffee" size={20} /></div>
                                            <input placeholder="飲料內容" className="w-full p-5 pl-14 bg-slate-50 border-none rounded-[24px] font-bold shadow-inner" value={formData.drinkContent} onChange={e => setFormData({...formData, drinkContent: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-3 px-1">
                                        <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest block">飽足感程度</label>
                                        <div className="flex gap-2">
                                            {['很餓', '剛好', '很飽'].map(l => (
                                                <button key={l} type="button" onClick={() => setFormData({...formData, isFull: l})} className={`flex-1 py-4 rounded-[20px] border-2 font-black text-sm transition-all ${formData.isFull === l ? 'border-green-500 bg-green-50 text-green-600 shadow-md' : 'border-slate-100 bg-slate-50 text-slate-300'}`}>{l}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <label className="block w-full h-64 border-4 border-dashed border-slate-100 rounded-[48px] flex flex-col items-center justify-center cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all overflow-hidden relative shadow-inner">
                                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={e => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const r = new FileReader();
                                                r.onloadend = () => setFormData({...formData, photo: r.result});
                                                r.readAsDataURL(file);
                                            }
                                        }} />
                                        {formData.photo ? (
                                            <img src={formData.photo} className="w-full h-full object-cover animate-in" />
                                        ) : (
                                            <div className="text-center">
                                                <div className="p-6 bg-white rounded-full shadow-xl mb-4 text-blue-500 group-hover:scale-110 transition-all mx-auto w-fit"><Icon name="camera" size={40} /></div>
                                                <span className="text-[11px] font-black text-slate-400 uppercase tracking-[0.3em]">開啟相機拍照</span>
                                            </div>
                                        )}
                                    </label>
                                    <button type="submit" disabled={isSubmitting} className="w-full bg-slate-900 text-white font-black py-6 rounded-[32px] shadow-2xl active:scale-[0.98] transition-all disabled:bg-slate-300 text-xl tracking-[0.4em]">
                                        {isSubmitting ? <div className="w-8 h-8 border-4 border-white border-t-transparent animate-spin rounded-full mx-auto"></div> : 'Confirm & Save'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {(view === 'history' || view === 'admin') && (
                            <div className="space-y-6 md:space-y-10 animate-in">
                                <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 px-2">
                                    <h2 className="text-4xl font-black tracking-tighter flex items-center gap-3">
                                        {view === 'admin' ? <Icon name="shield-check" size={32} className="text-purple-600" /> : <Icon name="history" size={32} className="text-blue-600" />}
                                        {view === 'admin' ? '全體數據監控' : '飲食歷史回顧'}
                                    </h2>
                                    <div className="flex items-center gap-2">
                                        <button onClick={downloadCSV} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-white border border-slate-200 text-slate-600 px-6 py-3.5 rounded-2xl font-black text-sm hover:bg-slate-50 shadow-sm transition-all">
                                            <Icon name="download" size={18} /> 匯出 CSV
                                        </button>
                                        <button onClick={() => {setEditingId(null); setFormData(prev => ({...prev, time: getLocalISOString()})); setView('report');}} className="flex-1 md:flex-none flex items-center justify-center gap-2 bg-blue-600 text-white px-6 py-3.5 rounded-2xl font-black text-sm shadow-xl hover:bg-blue-700 active:scale-95 transition-all">
                                            <Icon name="plus" size={18} /> 新增紀錄
                                        </button>
                                    </div>
                                </div>

                                {currentUser?.role === 'admin' && (
                                    <div className="bg-white p-6 rounded-[36px] shadow-md border border-slate-100 flex flex-col md:flex-row items-center gap-5">
                                        <div className="flex items-center gap-3 w-full md:w-auto">
                                            <Icon name="filter" size={22} className="text-slate-500" />
                                            <span className="font-black text-slate-400 uppercase text-xs tracking-widest">篩選使用者:</span>
                                        </div>
                                        <select className="flex-1 bg-slate-50 border-none rounded-2xl font-black text-slate-700 p-4 w-full md:max-w-xs outline-none cursor-pointer shadow-inner" value={adminFilterUser} onChange={e => setAdminFilterUser(e.target.value)}>
                                            <option value="all">查看全部人員 (All Users)</option>
                                            {[...new Set(appUsers.map(u => u.username))].map(uname => <option key={uname} value={uname}>{uname}</option>)}
                                        </select>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8 pb-24">
                                    {getDisplayRecords().length === 0 ? (
                                        <div className="col-span-full py-32 bg-white rounded-[56px] border-4 border-dashed border-slate-100 flex flex-col items-center gap-6">
                                            <Icon name="utensils" size={80} className="text-slate-100" />
                                            <p className="font-black text-slate-300 tracking-[0.4em] uppercase">無相關紀錄</p>
                                        </div>
                                    ) : (
                                        getDisplayRecords().map(record => (
                                            <div key={record.id} className="bg-white rounded-[50px] shadow-lg border border-slate-100 flex flex-col relative overflow-hidden group hover:shadow-2xl transition-all border-l-[12px] border-l-blue-600">
                                                <div className="absolute top-5 right-5 z-10 flex gap-2">
                                                    {(currentUser?.role === 'admin' || record.username === currentUser?.name) && (
                                                        <button onClick={() => { setEditingId(record.id); setFormData({...record}); setView('report'); }} className="p-3 bg-white/90 backdrop-blur-sm text-slate-400 rounded-2xl hover:bg-blue-600 hover:text-white shadow-lg transition-all scale-0 group-hover:scale-100"><Icon name="pencil" size={18} /></button>
                                                    )}
                                                </div>
                                                <div className="p-6 md:p-8 space-y-6">
                                                    <div className="flex gap-5">
                                                        <div className="w-24 h-24 md:w-32 md:h-32 rounded-[32px] overflow-hidden flex-shrink-0 bg-slate-50 border-4 border-white shadow-inner">
                                                            {record.photo ? <img src={record.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-200"><Icon name="camera-off" size={32} /></div>}
                                                        </div>
                                                        <div className="flex-1 min-w-0 flex flex-col justify-between">
                                                            <div className="space-y-1 text-left">
                                                                <div className="flex items-center justify-between">
                                                                    <span className={`text-[10px] px-3 py-1 rounded-lg font-black tracking-widest uppercase ${record.mealType === '早餐' ? 'bg-orange-50 text-orange-600' : 'bg-blue-50 text-blue-600'}`}>{record.mealType}</span>
                                                                    <span className="text-[10px] text-slate-300 font-bold">{record.time ? record.time.replace('T', ' ') : ''}</span>
                                                                </div>
                                                                <h3 className="text-xl font-black text-slate-800 line-clamp-1 mt-1">{record.foodContent}</h3>
                                                                <p className="text-xs text-slate-400 font-bold truncate flex items-center gap-1.5"><Icon name="coffee" size={14} className="text-slate-300" /> {record.drinkContent || '水'}</p>
                                                            </div>
                                                            <div className="flex items-center justify-between mt-4">
                                                                <span className={`text-[11px] px-4 py-1.5 rounded-2xl font-black uppercase ${record.isFull === '很飽' ? 'bg-green-100 text-green-700 shadow-sm shadow-green-50' : 'bg-slate-100 text-slate-500'}`}>{record.isFull}</span>
                                                                {view === 'admin' && <span className="text-[11px] text-white bg-slate-900 px-4 py-1.5 rounded-2xl font-black">@{record.username}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="pt-6 border-t border-slate-50 text-left">
                                                        {record.advice ? (
                                                            <div className="bg-blue-600 p-6 rounded-[36px] text-white shadow-xl relative overflow-hidden animate-in">
                                                                <div className="absolute top-0 right-0 p-6 opacity-10 rotate-12"><Icon name="sparkles" size={60} fill="white"/></div>
                                                                <div className="text-[11px] font-black uppercase tracking-[0.2em] mb-3 flex items-center gap-2"><Icon name="message-square" size={16} strokeWidth={3} fill="white"/> 營養師專業點評</div>
                                                                <p className="text-sm font-bold leading-relaxed">{record.advice}</p>
                                                            </div>
                                                        ) : (
                                                            currentUser?.role === 'admin' ? (
                                                                <div className="flex gap-2 p-1.5 bg-slate-50 rounded-[28px] border border-slate-100 shadow-inner">
                                                                    <input className="flex-1 bg-transparent border-none text-sm p-4 outline-none font-bold placeholder-slate-300" placeholder="給予專業建議..." value={adviceInputs[record.id] || ''} onChange={e => setAdviceInputs({...adviceInputs, [record.id]: e.target.value})} />
                                                                    <button onClick={() => handleSaveAdvice(record.id)} className="bg-blue-600 text-white p-4 rounded-[22px] active:scale-90 transition-all"><Icon name="send" size={20} /></button>
                                                                </div>
                                                            ) : <div className="text-[11px] text-slate-300 font-black italic tracking-widest text-center py-4">Nutritionist Analyzing...</div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 手機底部導覽 */}
                    {view !== 'login' && currentUser?.role !== 'admin' && (
                        <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-3xl border-t border-slate-100 px-10 py-6 flex justify-around items-center rounded-t-[50px] shadow-2xl z-40">
                            <button onClick={() => { setEditingId(null); setFormData(prev => ({...prev, time: getLocalISOString()})); setView('report'); }} className={`flex flex-col items-center gap-1 transition-all ${view === 'report' ? 'text-blue-600 scale-125' : 'text-slate-300'}`}>
                                <Icon name="plus-circle" size={30} strokeWidth={3} /><span className="text-[9px] font-black uppercase">回報</span>
                            </button>
                            <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 transition-all ${view === 'history' ? 'text-blue-600 scale-125' : 'text-gray-300'}`}>
                                <Icon name="history" size={30} strokeWidth={3} /><span className="text-[9px] font-black uppercase">紀錄</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
